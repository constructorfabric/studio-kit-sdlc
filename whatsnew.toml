# What's New — SDLC Kit

[whatsnew."1.0.0"]
summary = "Kit is a direct file package"
details = """\
- Moved from Cyber Pilot repository
- Kit content (artifacts/, codebase/, constraints.toml, SKILL.md, AGENTS.md) shipped as ready files
- `constraints.toml` now lives in kit source root (no longer auto-generated)
- ADR example switched to marker-based TOC format (`<!-- toc -->` / `<!-- /toc -->`)
- Kit slug simplified from `cypilot-sdlc` to `sdlc`
- `conf.toml` no longer copied into installed kit; version tracked in core.toml
- PRD: restructured FR examples with group (level 3) + entry (level 4) pattern
- FEATURE: added numbering and (CDSL) suffix to section heading examples
- DESIGN: added Functional Drivers/NFR Allocation examples, expanded component sub-headings\
"""
