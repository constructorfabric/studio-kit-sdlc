# What's New — SDLC Kit

[whatsnew."2.0.0"]
summary = "Rebrand: Cyber Pilot → Cyber Constructor (BREAKING)"
details = """\
- BREAKING: project rebranded from `Cyber Pilot` to `Cyber Constructor`
- BREAKING: CLI tool renamed `cpt` → `cfc` — update all install/update/validate commands
- BREAKING: skill renamed `cypilot-sdlc` → `cf-constructor-sdlc`
- BREAKING: workflows renamed `cypilot-pr-review` → `cf-constructor-pr-review`, `cypilot-pr-status` → `cf-constructor-pr-status`, `cypilot-migrate-openspec` → `cf-constructor-migrate-openspec`
- BREAKING: slash-commands renamed `/cypilot-generate` → `/cf-constructor-generate`, `/cypilot-analyze` → `/cf-constructor-analyze`
- BREAKING: path variable renamed `{cypilot_path}` → `{cf-constructor-path}`; mode variable renamed `{cypilot_mode}` → `{cf-constructor-mode}`
- BREAKING: workflow frontmatter field renamed `cypilot: true` → `cf-constructor: true`
- BREAKING: skill directory and script renamed `.core/skills/cypilot/` → `.core/skills/cf-constructor/`, `cypilot.py` → `cfc.py`
- BREAKING: legacy adapter directory renamed `.cypilot-adapter/` → `.cf-constructor-adapter/`
- BREAKING: repo references updated `cyberfabric/cyber-pilot{,-kit-sdlc}` → `cyberfabric/cyber-constructor{,-kit-sdlc}`
- `scripts/pr.py`: Python identifiers added (`_CFC_REL`, `CFC_PATH`, `_read_cfc_path`); legacy names (`_CYPILOT_REL`, `CYPILOT_PATH`, `_read_cypilot_path`) preserved as aliases; auto-detect candidates now `(".cfc", "cfc", "cf-constructor", ".cypilot", "cypilot")`; AGENTS.md TOML key `cf-constructor-path` is read first, with `cypilot_path` as legacy fallback
- Documentation/CDSL references updated: `Cypilot DSL (CDSL)` → `Cyber Constructor DSL (CDSL)` (the **CDSL** acronym is preserved)
- Stable interop preserved (no migration required): `cpt-{system}-{kind}-{slug}` artifact ID prefix, `@cpt-*` code traceability markers (flow/algo/state/dod, begin/end), `@cpt:root-agents` AGENTS.md root marker — these remain unchanged across the rebrand to keep existing IDs and code annotations valid\
"""

[whatsnew."1.3.0"]
summary = "Lazy loading for all rules.md dependencies"
details = """\
- All artifact rules.md files now use lazy loading for dependencies (templates, checklists, examples)
- Removed mandatory "Load Dependencies" section from Prerequisites
- Added "Load on demand" blocks directly before sections that require each resource
- Templates load WHEN generating artifact structure OR WHEN validating structure
- Checklists load WHEN checking semantic quality OR during Semantic Validation phase
- Examples load WHEN needing reference for content depth/style
- Constraints and traceability specs load WHEN validating cross-references or ID formats
- Affected files: PRD/rules.md, DESIGN/rules.md, FEATURE/rules.md, ADR/rules.md, DECOMPOSITION/rules.md, codebase/rules.md
- fix(pr-status): report unresolved non-outdated review threads correctly\
"""

[whatsnew."1.2.0"]
summary = "Added OpenSpec to Cyber Constructor SDLC migration workflow"
details = """\
- New `migrate-openspec` workflow for converting OpenSpec artifacts (proposals, specs, designs, tasks) to Cyber Constructor SDLC documents (PRD, DESIGN, ADR, FEATURE, DECOMPOSITION) with code-verified traceability
- Workflow is fully parameterized — works for any project with OpenSpec artifacts
- Includes Configuration section with variable discovery protocol
- Includes OpenSpec Format Reference appendix for agent context
- 8-phase migration: Inventory → PRD → DESIGN → ADR → DECOMPOSITION → FEATURE → Code Markers → Validate
- Each phase uses Code Verification Protocol to ground artifacts in actual codebase behavior\
"""

[whatsnew."1.1.1"]
summary = "Resource ID variables for cross-references"
details = """\
- Replaced all hardcoded `{cf-constructor-path}/config/kits/sdlc/...` paths with `{resource_id}` variables from `manifest.toml`
- Affected files: all `rules.md` (ADR, DECOMPOSITION, DESIGN, FEATURE, PRD), `codebase/rules.md`, `AGENTS.md`, `SKILL.md`, workflows, `scripts/pr-review.toml`
- Fixed stale reference to `artifacts/FEATURE/examples/task-crud.md` (now uses `{feature_example}`)
- Cross-references are now consistent and maintainable via manifest resource IDs\
"""

[whatsnew."1.1.0"]
summary = "Declarative installation manifest"
details = """\
- Added `manifest.toml` — declarative kit installation manifest per `kit-manifest.schema.json`
- All artifact and codebase resources declared as per-file entries with `user_modifiable = true`
- Workflows (pr-review, pr-status) declared per-file with `user_modifiable = false`
- Scripts declared as a single directory resource with `user_modifiable = true`
- Kit-level files (constraints.toml, SKILL.md, AGENTS.md) declared with `user_modifiable = false`
- Guides, README, whatsnew.toml, and pipeline diagram excluded from installation
- Resource bindings registered in `core.toml` under `[kits.sdlc.resources]` at install time\
"""

[whatsnew."1.0.0"]
summary = "Kit is a direct file package"
details = """\
- Moved from Cyber Constructor repository
- Kit content (artifacts/, codebase/, constraints.toml, SKILL.md, AGENTS.md) shipped as ready files
- `constraints.toml` now lives in kit source root (no longer auto-generated)
- ADR example switched to marker-based TOC format (`<!-- toc -->` / `<!-- /toc -->`)
- Kit slug simplified from `cf-constructor-sdlc` to `sdlc`
- `conf.toml` no longer copied into installed kit; version tracked in core.toml
- PRD: restructured FR examples with group (level 3) + entry (level 4) pattern
- FEATURE: added numbering and (CDSL) suffix to section heading examples
- DESIGN: added Functional Drivers/NFR Allocation examples, expanded component sub-headings\
"""
